<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetaCher</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ====== Crease Overlays (book spine effect) ====== -->
  <div class="crease crease-highlight">
    <img src="https://freight.cargo.site/w/1000/i/F2167433706956006572355604866849/crease-screen.png" alt="">
  </div>
  <div class="crease crease-shadow">
    <img src="https://freight.cargo.site/w/1000/i/E2167433100962017006923124729633/crease-multiply.png" alt="">
  </div>

  <!-- ====== Pinned Nav ====== -->
  <header class="pinned-top">
    <div class="nav-row">
      <div class="nav-left"><a href="#" class="brand">MetaCher</a></div>
      <div class="nav-right">
        <a href="information.html">Information</a>,
        <a href="#index">Index</a>
      </div>
    </div>
  </header>

  <!-- ====== Content Pages ====== -->
  <main>

    <!-- Page 1 -->
    <section class="page">
      <div class="spread">
        <div class="col col-left align-right">
          <img class="zoomable" src="1.jpg" alt="" data-caption="MetaCher, 2025">
        </div>
        <div class="col col-right">
          <img class="zoomable" src="new-3.JPG" alt="" data-caption="MetaCher, 2025" style="width:50%;">
        </div>
      </div>
    </section>

    <!-- Page 2 -->
    <section class="page">
      <div class="spread">
        <div class="col col-left">
          <img class="zoomable" src="new-2.jpg" alt="" data-caption="MetaCher, 2025">
          <img class="zoomable align-right" src="4.png" alt="" data-caption="MetaCher, 2025" style="width:50%;">
        </div>
        <div class="col col-right">
          <img class="zoomable" src="5.png" alt="" data-caption="MetaCher, 2025" style="width:50%;">
          <img class="zoomable" src="new-2.jpg" alt="" data-caption="MetaCher, 2025">
        </div>
      </div>
    </section>

    <!-- Page 3 -->
    <section class="page">
      <div class="spread">
        <div class="col col-left">
          <img class="zoomable" src="7.png" alt="" data-caption="MetaCher, 2025">
        </div>
        <div class="col col-right">
          <img class="zoomable" src="8.png" alt="" data-caption="MetaCher, 2025" style="width:75%;">
        </div>
      </div>
    </section>

    <!-- Page 4: Full width -->
    <section class="page">
      <div class="full-width">
        <img class="zoomable" src="9.png" alt="" data-caption="MetaCher, 2025">
      </div>
    </section>

    <!-- Page 5 -->
    <section class="page">
      <div class="spread">
        <div class="col col-left">
          <img class="zoomable" src="4.png" alt="" data-caption="MetaCher, 2025" style="width:66%;">
          <img class="zoomable align-right" src="7.png" alt="" data-caption="MetaCher, 2025" style="width:50%;">
        </div>
        <div class="col col-right">
          <img class="zoomable" src="2.png" alt="" data-caption="MetaCher, 2025">
        </div>
      </div>
    </section>

    <!-- Page 6 -->
    <section class="page">
      <div class="spread">
        <div class="col col-left align-right">
          <img class="zoomable" src="5.png" alt="" data-caption="MetaCher, 2025">
        </div>
        <div class="col col-right">
          <img class="zoomable" src="9.png" alt="" data-caption="MetaCher, 2025" style="width:50%;">
        </div>
      </div>
    </section>

    <!-- Page 7: Single image -->
    <section class="page">
      <div class="full-width align-right">
        <img class="zoomable" src="3.png" alt="" data-caption="MetaCher, 2025" style="width:66%;">
      </div>
    </section>

    <!-- Page 8 -->
    <section class="page">
      <div class="spread">
        <div class="col col-left align-right">
          <img class="zoomable" src="8.png" alt="" data-caption="MetaCher, 2025" style="width:66%;">
        </div>
        <div class="col col-right"></div>
      </div>
    </section>

    <!-- ====== Index Gallery ====== -->
    <section class="page" id="index">
      <div class="gallery-grid">
        <div class="gallery-item">
          <img class="zoomable" src="1.jpg" alt="" data-caption="MetaCher, 2025">
          <figcaption>MetaCher, 2025</figcaption>
        </div>
        <div class="gallery-item">
          <img class="zoomable" src="2.png" alt="" data-caption="MetaCher, 2025">
          <figcaption>MetaCher, 2025</figcaption>
        </div>
        <div class="gallery-item">
          <img class="zoomable" src="3.png" alt="" data-caption="MetaCher, 2025">
          <figcaption>MetaCher, 2025</figcaption>
        </div>
        <div class="gallery-item">
          <img class="zoomable" src="4.png" alt="" data-caption="MetaCher, 2025">
          <figcaption>MetaCher, 2025</figcaption>
        </div>
        <div class="gallery-item">
          <img class="zoomable" src="5.png" alt="" data-caption="MetaCher, 2025">
          <figcaption>MetaCher, 2025</figcaption>
        </div>
        <div class="gallery-item">
          <img class="zoomable" src="6.png" alt="" data-caption="MetaCher, 2025">
          <figcaption>MetaCher, 2025</figcaption>
        </div>
        <div class="gallery-item">
          <img class="zoomable" src="7.png" alt="" data-caption="MetaCher, 2025">
          <figcaption>MetaCher, 2025</figcaption>
        </div>
        <div class="gallery-item">
          <img class="zoomable" src="8.png" alt="" data-caption="MetaCher, 2025">
          <figcaption>MetaCher, 2025</figcaption>
        </div>
        <div class="gallery-item">
          <img class="zoomable" src="9.png" alt="" data-caption="MetaCher, 2025">
          <figcaption>MetaCher, 2025</figcaption>
        </div>
      </div>
    </section>

  </main>

  <!-- ====== Pinned Footer ====== -->
  <footer class="pinned-bottom">
    <div class="footer-row">
      <div class="footer-left"><a href="#">&copy; MetaCher</a></div>
      <div class="footer-center"><a href="https://www.instagram.com/metacherart" target="_blank">Instagram</a></div>
      <div class="footer-right"><a href="mailto:metacher.art@gmail.com">Email</a></div>
    </div>
  </footer>

  <!-- ====== Quick-View Lightbox ====== -->
  <div class="quick-view" id="quickView">
    <div class="quick-view-bg" id="quickViewBg"></div>
    <div class="quick-view-frame">
      <button class="qv-nav qv-prev" id="qvPrev">&lsaquo;</button>
      <img class="quick-view-img" id="quickViewImg" src="" alt="">
      <button class="qv-nav qv-next" id="qvNext">&rsaquo;</button>
      <div class="qv-caption" id="qvCaption"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
