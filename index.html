<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetaCher</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ====== Crease Overlays (book spine effect) ====== -->
  <div class="crease crease-highlight">
    <img src="https://freight.cargo.site/w/1000/i/F2167433706956006572355604866849/crease-screen.png" alt="">
  </div>
  <div class="crease crease-shadow">
    <img src="https://freight.cargo.site/w/1000/i/E2167433100962017006923124729633/crease-multiply.png" alt="">
  </div>

  <!-- ====== Pinned Nav ====== -->
  <header class="pinned-top">
    <div class="nav-row">
      <div class="nav-left"><a href="#" class="brand">MetaCher</a></div>
      <div class="nav-right">
        <a href="information.html">Information</a>,
        <a href="#index">Index</a>
      </div>
    </div>
  </header>

  <!-- ====== Content Pages ====== -->
  <main>

    <!-- Page 1: original 3000×3896 left + 3000×4314 right 50% -->
    <section class="page">
      <div class="spread">
        <div class="col col-left align-right">
          <img class="zoomable" src="1.jpg" alt="" data-caption="MetaCher, 2025" style="aspect-ratio:3000/3896; object-fit:cover;">
        </div>
        <div class="col col-right">
          <img class="zoomable" src="new-3.JPG" alt="" data-caption="MetaCher, 2025" style="width:50%; aspect-ratio:3000/4314; object-fit:cover;">
        </div>
      </div>
    </section>

    <!-- Page 2: original L-top 3000×3439, L-bottom 3000×3874 50%, R-top 3000×3989 50%, R-bottom 3000×4503 -->
    <section class="page">
      <div class="spread">
        <div class="col col-left">
          <img class="zoomable" src="new-2.jpg" alt="" data-caption="MetaCher, 2025" style="aspect-ratio:3000/3439; object-fit:cover;">
          <img class="zoomable align-right" src="4.png" alt="" data-caption="MetaCher, 2025" style="width:50%; aspect-ratio:3000/3874; object-fit:cover;">
        </div>
        <div class="col col-right">
          <img class="zoomable" src="5.png" alt="" data-caption="MetaCher, 2025" style="width:50%; aspect-ratio:3000/3989; object-fit:cover;">
          <img class="zoomable" src="6.png" alt="" data-caption="MetaCher, 2025" style="aspect-ratio:3000/4503; object-fit:cover;">
        </div>
      </div>
    </section>

    <!-- Page 3: original 3000×4129 left + 3000×2083 right 75% -->
    <section class="page">
      <div class="spread">
        <div class="col col-left">
          <img class="zoomable" src="7.png" alt="" data-caption="MetaCher, 2025" style="aspect-ratio:3000/4129; object-fit:cover;">
        </div>
        <div class="col col-right">
          <img class="zoomable" src="8.png" alt="" data-caption="MetaCher, 2025" style="width:75%; aspect-ratio:3000/2083; object-fit:cover;">
        </div>
      </div>
    </section>

    <!-- Page 4: original 3000×2076 full width -->
    <section class="page">
      <div class="full-width">
        <img class="zoomable" src="9.png" alt="" data-caption="MetaCher, 2025" style="aspect-ratio:3000/2076; object-fit:cover;">
      </div>
    </section>

    <!-- Page 5: original L-top 3000×2122 66%, L-bottom 3000×4475 50%, R 3000×3426 -->
    <section class="page">
      <div class="spread">
        <div class="col col-left">
          <img class="zoomable" src="3.png" alt="" data-caption="MetaCher, 2025" style="width:66%; aspect-ratio:3000/2122; object-fit:cover;">
          <img class="zoomable align-right" src="2.png" alt="" data-caption="MetaCher, 2025" style="width:50%; aspect-ratio:3000/4475; object-fit:cover;">
        </div>
        <div class="col col-right">
          <img class="zoomable" src="new-1.jpg" alt="" data-caption="MetaCher, 2025" style="aspect-ratio:3000/3426; object-fit:cover;">
        </div>
      </div>
    </section>

    <!-- Page 6: original 1626×2999 left align-right + 3000×3897 right 50% -->
    <section class="page">
      <div class="spread">
        <div class="col col-left align-right">
          <img class="zoomable" src="5.png" alt="" data-caption="MetaCher, 2025" style="aspect-ratio:1626/2999; object-fit:cover;">
        </div>
        <div class="col col-right">
          <img class="zoomable" src="4.png" alt="" data-caption="MetaCher, 2025" style="width:50%; aspect-ratio:3000/3897; object-fit:cover;">
        </div>
      </div>
    </section>

    <!-- Page 7: original 3000×2310 single 66% align-right -->
    <section class="page">
      <div class="full-width align-right">
        <img class="zoomable" src="8.png" alt="" data-caption="MetaCher, 2025" style="width:66%; aspect-ratio:3000/2310; object-fit:cover;">
      </div>
    </section>

    <!-- Page 8: original 3000×2071 left 66% align-right, right empty -->

      <div class="spread">
        <div class="col col-left align-right">
          <img class="zoomable" src="9.png" alt="" data-caption="MetaCher, 2025" style="width:66%; aspect-ratio:3000/2071; object-fit:cover;">
        </div>
        <div class="col col-right"></div>
      </div>
    </section>

      <div class="gallery-grid">
        <div class="gallery-item">

        </div>

        </div>
        <div class="gallery-item">
          <img class="zoomable" src="5.png" alt="" data-caption="MetaCher, 2025">

        </div>
        <div class="gallery-item">
          <img class="zoomable" src="6.png" alt="" data-caption="MetaCher, 2025">
          <figcaption>MetaCher, 2025</figcaption>
        </div>
        <div class="gallery-item">

        </div>
        <div class="gallery-item">
          <img class="zoomable" src="8.png" alt="" data-caption="MetaCher, 2025">

        <div class="gallery-item">
          <img class="zoomable" src="9.png" alt="" data-caption="MetaCher, 2025">

  <!-- ====== Pinned Footer ====== -->
  <footer class="pinned-bottom">
    <div class="footer-row">
      <div class="footer-left"><a href="#">&copy; MetaCher</a></div>
      <div class="footer-center"><a href="https://www.instagram.com/metacherart" target="_blank">Instagram</a></div>
      <div class="footer-right"><a href="mailto:metacher.art@gmail.com">Email</a></div>
    </div>
  </footer>

  <!-- ====== Quick-View Lightbox ====== -->
  <div class="quick-view" id="quickView">
    <div class="quick-view-bg" id="quickViewBg"></div>
    <div class="quick-view-frame">
      <button class="qv-nav qv-prev" id="qvPrev">&lsaquo;</button>
      <img class="quick-view-img" id="quickViewImg" src="" alt="">
      <button class="qv-nav qv-next" id="qvNext">&rsaquo;</button>
      <div class="qv-caption" id="qvCaption"></div>
    </div>
  </div>

  <script src="script.js"></script>

</html>
